name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing! Describe what you'd like to add or change.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what improvement does it enable?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your approach at a high level.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, examples, or anything else relevant.
    validations:
      required: false
